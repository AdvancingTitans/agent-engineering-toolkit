name: GitHub Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: test "${GITHUB_REF_NAME#v}" = "$(uv run python -c 'import aet; print(aet.__version__)')"
      - run: uv run --no-editable --reinstall-package agent-engineering-toolkit python -m unittest discover -s tests -v
      - run: uv run --no-editable --reinstall-package agent-engineering-toolkit aet audit . --strict --format json --output .aet/evidence/release-audit.json
      - run: uv build
      - run: uv run --isolated --with "$(find dist -name '*.whl' -print -quit)" aet --version
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --title "AET $GITHUB_REF_NAME"
