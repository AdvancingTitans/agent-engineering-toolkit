name: Publish exact CI artifact to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to publish
        required: true
        type: string
      ci_run_id:
        description: Successful CI run that produced the exact release candidate
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: astral-sh/setup-uv@v5
      - name: Verify tag and CI provenance
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$CI_RUN_ID" =~ ^[0-9]+$ ]]
          test "$(git describe --tags --exact-match)" = "$RELEASE_TAG"
          target_sha="$(git rev-parse HEAD)"
          echo "TARGET_SHA=$target_sha" >> "$GITHUB_ENV"
          run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}")"
          test "$(jq -r .head_sha <<<"$run_json")" = "$target_sha"
          test "$(jq -r .conclusion <<<"$run_json")" = success
          test "$(jq -r .event <<<"$run_json")" = push
          test "$(jq -r .path <<<"$run_json")" = .github/workflows/ci.yml
      - uses: actions/download-artifact@v4
        with:
          name: release-candidate-${{ env.TARGET_SHA }}
          path: .aet/ci-download
          run-id: ${{ inputs.ci_run_id }}
          github-token: ${{ github.token }}
      - name: Verify exact wheel
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          manifest=.aet/ci-download/ci/manifest.json
          test "$(jq -r .schema_version "$manifest")" = aet-ci-release-candidate/v1
          test "$(jq -r .commit "$manifest")" = "$TARGET_SHA"
          test "$(jq -r .version "$manifest")" = "${RELEASE_TAG#v}"
          wheel=".aet/ci-download/ci/dist/$(jq -r .wheel "$manifest")"
          test "$(sha256sum "$wheel" | cut -d' ' -f1)" = "$(jq -r .wheel_sha256 "$manifest")"
          test "$(uv run --isolated --with "$wheel" aet --version)" = "${RELEASE_TAG#v}"
          mkdir .aet/pypi
          cp "$wheel" .aet/pypi/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: .aet/pypi/
