name: Real Host Gate

on:
  workflow_dispatch:
    inputs:
      commit:
        description: Full commit SHA to evaluate (dispatch this workflow from the same ref)
        required: true
        type: string

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install tracked AET and Codex runner
        env:
          EXPECTED_COMMIT: ${{ inputs.commit }}
        run: |
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          uv tool install .
          npm install --global @openai/codex@0.144.1
          VERSION="$(aet --version)"
          RELEASE_DIR=".aet/release/v$VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_DIR=$RELEASE_DIR" >> "$GITHUB_ENV"
          test "$(codex --version)" = "codex-cli 0.144.1"
      - name: Run the complete commit-bound real Codex gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          uv run python eval/real-agent/run_real_host_gate.py \
            --root . --release-dir "$RELEASE_DIR" \
            --expected-commit "$GITHUB_SHA" --expected-version "$VERSION"
      - name: Upload passing real-host gate
        uses: actions/upload-artifact@v4
        with:
          name: real-host-gate
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
          path: |
            ${{ env.RELEASE_DIR }}/raw-gate.json
            ${{ env.RELEASE_DIR }}/gate-plan.json
            ${{ env.RELEASE_DIR }}/real-host-gate.json
