name: Agent context audit

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # Source install avoids depending on a package version that may not exist on PyPI yet.
      - run: uv tool install .
      - run: aet audit . --format sarif --output aet.sarif --strict
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: aet.sarif
