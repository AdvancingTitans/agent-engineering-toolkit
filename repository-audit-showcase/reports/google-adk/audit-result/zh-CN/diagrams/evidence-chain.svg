<svg xmlns="http://www.w3.org/2000/svg" width="900" height="230" viewBox="0 0 900 230" role="img" aria-labelledby="title desc"><title id="title">证据链</title><desc id="desc">需求、实现、执行与验证四个阶段的证据状态。</desc><rect width="100%" height="100%" fill="#0b1020"/><rect x="35" y="65" width="160" height="90" rx="12" fill="#121a2d" stroke="#67e8a5" stroke-width="2"/><text x="115" y="105" text-anchor="middle" fill="#e7edf8" font-family="system-ui" font-size="15">需求</text><text x="115" y="130" text-anchor="middle" fill="#67e8a5" font-family="system-ui" font-size="11">已有证据</text><path d="M 195 110 L 245 110" stroke="#667899" stroke-width="2"/><rect x="250" y="65" width="160" height="90" rx="12" fill="#121a2d" stroke="#67e8a5" stroke-width="2"/><text x="330" y="105" text-anchor="middle" fill="#e7edf8" font-family="system-ui" font-size="15">实现</text><text x="330" y="130" text-anchor="middle" fill="#67e8a5" font-family="system-ui" font-size="11">已有证据</text><path d="M 410 110 L 460 110" stroke="#667899" stroke-width="2"/><rect x="465" y="65" width="160" height="90" rx="12" fill="#121a2d" stroke="#fbbf6b" stroke-width="2"/><text x="545" y="105" text-anchor="middle" fill="#e7edf8" font-family="system-ui" font-size="15">执行</text><text x="545" y="130" text-anchor="middle" fill="#fbbf6b" font-family="system-ui" font-size="11">未知</text><path d="M 625 110 L 675 110" stroke="#667899" stroke-width="2"/><rect x="680" y="65" width="160" height="90" rx="12" fill="#121a2d" stroke="#67e8a5" stroke-width="2"/><text x="760" y="105" text-anchor="middle" fill="#e7edf8" font-family="system-ui" font-size="15">验证</text><text x="760" y="130" text-anchor="middle" fill="#67e8a5" font-family="system-ui" font-size="11">已有证据</text></svg>
