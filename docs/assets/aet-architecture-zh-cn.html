<div class="cards"><div class="card"><b>条件化证据预算</b><p>风险、声明、覆盖、效应、功效和精确字节共同决定上限，不存在通用“36 次”定律。</p></div><div class="card"><b>无损削减优先</b><p>预检、失败即停、精确续跑/复用、合法序贯边界与一次构建消除可避免成本。</p></div><div class="card"><b>权限保持非对称</b><p>Candidate 不能改写 Evaluator、提前打开 Held-out、把 UNKNOWN 变成 PASS，或批准自身 Adoption；仅行为改进/采纳使用配对真实宿主。</p></div></div></main></body></html>
